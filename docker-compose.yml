services:
  # === Reverse Proxy ===
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html:ro
    depends_on:
      - php
    networks:
      - cms-network

  # === PHP Application ===
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.dev
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-cms_db}
      DB_USERNAME: ${POSTGRES_USER:-cms_user}
      DB_PASSWORD: ${DB_PASSWORD:-cms_secret_2026}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cms-network

  # === PostgreSQL + pgvector ===
  postgres:
    image: ankane/pgvector:v0.8.0-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cms_db}
      POSTGRES_USER: ${POSTGRES_USER:-cms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cms_secret_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cms_user} -d ${POSTGRES_DB:-cms_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cms-network

  # === Redis ===
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cms-network

  # === MinIO (S3-compatible storage) ===
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-cms_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-cms_minio_secret_2026}
    volumes:
      - minio_data:/data
    networks:
      - cms-network

  # === Mailpit (dev mail server) ===
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - cms-network

  # === Laravel Reverb (WebSocket) ===
  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.dev
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      REVERB_APP_ID: ${REVERB_APP_ID:-cms-reverb}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-cms-reverb-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-cms-reverb-secret}
      REDIS_HOST: redis
    depends_on:
      - redis
    networks:
      - cms-network

  # === Laravel Horizon (Queue Manager) ===
  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.dev
    command: php artisan horizon
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-cms_db}
      DB_USERNAME: ${POSTGRES_USER:-cms_user}
      DB_PASSWORD: ${DB_PASSWORD:-cms_secret_2026}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
    depends_on:
      - redis
      - postgres
    networks:
      - cms-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  cms-network:
    driver: bridge
